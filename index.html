<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>HorseFeed Manager</title>

    <meta
      name="description"
      content="Diet, nutrition, feeding history, and life-stage management app for riding horses."
    />

    <!-- iPhone / iPad home screen icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/horse-nutrition-app/apple-touch-icon.png?v=2"
    />
    <link
      rel="apple-touch-icon-precomposed"
      sizes="180x180"
      href="/horse-nutrition-app/apple-touch-icon.png?v=2"
    />

    <!-- Browser icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/horse-nutrition-app/icon-192.png?v=2"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/horse-nutrition-app/icon-512.png?v=2"
    />

    <!-- PWA manifest -->
    <link rel="manifest" href="/horse-nutrition-app/manifest.webmanifest?v=2" />

    <!-- iOS standalone mode -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="HorseFeed" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- App colors -->
    <meta name="theme-color" content="#062826" />
    <meta name="background-color" content="#062826" />

    <!-- Social preview / LINE preview -->
    <meta property="og:title" content="HorseFeed Manager" />
    <meta
      property="og:description"
      content="Diet, nutrition, feeding history, and life-stage management app for riding horses."
    />
    <meta
      property="og:image"
      content="/horse-nutrition-app/icon-512.png?v=2"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
